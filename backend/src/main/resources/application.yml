server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/Finance}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
  reset-token-minutes: ${APP_RESET_TOKEN_MINUTES:30}
  jwt:
    secret: ${APP_JWT_SECRET:<SECRET>replace-with-a-long-secret-key-for-production}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${APP_JWT_REFRESH_EXPIRATION_MS:604800000}

  security:
    require-https: ${APP_SECURITY_REQUIRE_HTTPS:false}
    allowed-origins: ${APP_SECURITY_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  backup:
    script-path: ${APP_BACKUP_SCRIPT_PATH:../scripts/backup-finance.ps1}
